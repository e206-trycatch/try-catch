spring:
  application:
    name: trycatch

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30    # 여기가 핵심! (현재 10으로 잡혀있음)
      minimum-idle: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        show_sql: false
        format_sql: false


  data:
    redis:
      host: localhost  # Docker Compose 환경
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: io.ssafy.trycatch.domain
  configuration:
    map-underscore-to-camel-case: true

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 1800000      # 30분
  refresh-token-validity: 604800000   # 7일

gpt:
  api:
    url: ${GMS_BACK_BASE_URL}
    key: ${GMS_API_KEY}
    model: gpt-5-mini

# 로깅 설정
logging:
  level:
    org.hibernate.SQL: debug
    io.ssafy: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"


minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ROOT_USER}
  secret-key: ${MINIO_ROOT_PASSWORD}
  bucket: ${MINIO_BUCKET}

app:
  file-base-url: ${FILE_BASE_URL}

ai:
  server:
    base-url: ${AI_SERVER_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# 서버 설정
server:
  port: 8081
  # forward-headers-strategy: nginx 같은 프록시 서버 뒤에서 Spring이 실행될 때 필요한 설정
  # 프록시가 전달하는 X-Forwarded-* 헤더(원본 호스트, 프로토콜, IP 등)를 Spring이 인식하도록 함
  # 이 설정이 없으면 Spring은 요청의 Origin을 잘못 인식하여 CORS 에러가 발생할 수 있음
  forward-headers-strategy: framework
scoring:
  mock-enabled: false
  mock-delay-ms: 30000

