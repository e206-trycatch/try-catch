services:
  minio:
    image: minio/minio:latest
    container_name: trycatch-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data  # named volume (데이터 보존)
    ports:
      - "8085:9001"  # Console만 외부 노출
    expose:
      - "9000"  # API는 Spring Boot 프록시로만
    networks:
      - network
    restart: unless-stopped

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: trycatch-ai
    environment:
      GMS_API_KEY: ${GMS_API_KEY}
      GMS_BASE_URL: ${GMS_BASE_URL}
      GUARDRAIL_MODEL: ${GUARDRAIL_MODEL}
      HINT_MODEL: ${HINT_MODEL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      BACKEND_API_TOKEN: ${BACKEND_API_TOKEN}
      TZ: Asia/Seoul
    expose:
      - "8000"
    networks:
      - network
    depends_on:
      minio:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    container_name: trycatch-prometheus
    volumes:
      - ./backend/prometheus-prod.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "8083:9090"
    networks:
      - network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: trycatch-grafana
    ports:
      - "8082:3000"
    networks:
      - network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
    - grafana_data:/var/lib/grafana
    restart: unless-stopped

networks:
  network:
    name: trycatch-net
    external: true

volumes:
  minio_data:
  prometheus_data:
  grafana_data: