services:
  minio:
    image: minio/minio:latest
    container_name: trycatch-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data  # named volume (데이터 보존)
    ports:
      - "8085:9001"  # Console만 외부 노출
    expose:
      - "9000"  # API는 Spring Boot 프록시로만
    networks:
      - network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    restart: unless-stopped

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: trycatch-ai
    environment:
      GMS_API_KEY: ${GMS_API_KEY}
      GMS_BASE_URL: ${GMS_BASE_URL}
      GUARDRAIL_MODEL: ${GUARDRAIL_MODEL}
      HINT_MODEL: ${HINT_MODEL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      BACKEND_API_TOKEN: ${BACKEND_API_TOKEN}
      TZ: Asia/Seoul
    expose:
      - "8000"
    networks:
      - network
    depends_on:
      minio:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  network:
    name: trycatch-net
    external: true  # 백엔드가 만든 네트워크 사용

volumes:
  minio_data:  # 데이터 보존